<!DOCTYPE html>
<html>
<head>
    <title>Professional Post Generator</title>
</head>
<body style="background:#111;color:white;text-align:center;font-family:sans-serif;">

    <h1>Professional News Post Generator</h1>

    <form method="POST" enctype="multipart/form-data">

        <p>Background Image</p>
        <input type="file" name="background" required><br><br>

        <p>Logo (PNG)</p>
        <input type="file" name="logo" required><br><br>

        <p>Social Icons (Optional)</p>
        <input type="file" name="icons" multiple><br><br>

        <p>Headline</p>
        <textarea name="headline" rows="3" cols="60" required></textarea><br><br>

        <p>Highlight Words (comma separated)</p>
        <input type="text" name="highlight"><br><br>

        <p>Username</p>
        <input type="text" name="username" required><br><br>

        <button type="submit">Generate Post</button>

    </form>

    {% if image_url %}
        <h2>Preview</h2>
        <img src="{{ image_url }}" width="500">
    {% endif %}

</body>
</html>
