<!DOCTYPE html>
<html>

<head>

<title>AI News Post Generator</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>AI Post Generator</h1>

<form method="POST" enctype="multipart/form-data">

<div class="upload">

<label>Background Image</label>
<input type="file" name="background" required onchange="previewImage(event,'bgPreview')">
<img id="bgPreview">
</div>

<div class="upload">

<label>Logo</label>
<input type="file" name="logo" required onchange="previewImage(event,'logoPreview')">
<img id="logoPreview">

</div>

<div class="upload">

<label>Social Icons</label>
<input type="file" name="icons" multiple>

</div>

<label>Headline</label>
<textarea name="headline" placeholder="Write headline here..." required></textarea>

<label>Highlight Words</label>
<input type="text" name="highlight" placeholder="storm,breaking,alert">

<label>Username</label>
<input type="text" name="username" placeholder="@yourpage" required>

<button type="submit">Generate Post</button>

</form>

{% if image_url %}

<div class="preview">

<h2>Your Post</h2>

<img src="{{ image_url }}">

<a href="{{ image_url }}" download>

<button class="download">⬇ Download</button>

</a>

</div>

{% endif %}

</div>

<script>

function previewImage(event,id){

let reader=new FileReader()

reader.onload=function(){
document.getElementById(id).src=reader.result
}

reader.readAsDataURL(event.target.files[0])

}

</script>

</body>
</html>
